name: Sync SDK versions

on:
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.PREMEX_POT_APP_ID }}
          private-key: ${{ secrets.PREMEX_POT_APP_SECRET }}
          owner: ${{ github.repository_owner }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check for new SDK versions
        id: sync
        run: python3 scripts/sync-sdk-versions.py

      - name: Create PR if new versions found
        if: steps.sync.outputs.has_new == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="auto/sync-sdk-versions"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "Add new cmdline-tools versions: ${{ steps.sync.outputs.new_versions }}"
          git push -f origin "$BRANCH"
          gh pr create \
            --title "Add new cmdline-tools versions: ${{ steps.sync.outputs.new_versions }}" \
            --body "Automatically detected new Android SDK cmdline-tools versions and added corresponding test folders." \
            --head "$BRANCH" \
            --base main || echo "PR already exists"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
